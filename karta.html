<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Badkarta Skåne</title>
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="preconnect" href="https://upload.wikimedia.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --ink: #162022;
      --muted: #5d6a6d;
      --line: #d8e2e3;
      --page: #f4f8f7;
      --panel: #ffffff;
      --sea: #006b7d;
      --sea-soft: #dff3f4;
      --lake: #286148;
      --lake-soft: #e4f4eb;
      --sun: #f2b84b;
      --good: #15724f;
      --warn: #956400;
      --bad: #b23b42;
      --shadow: 0 16px 32px rgba(31, 53, 58, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--page);
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }

    button, .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--sea);
      background: var(--sea);
      color: white;
      border-radius: 8px;
      min-height: 42px;
      padding: .65rem .9rem;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      line-height: 1.15;
    }

    button.secondary, .nav-button.secondary {
      background: white;
      color: var(--sea);
      border-color: var(--line);
    }

    button:disabled { opacity: .6; cursor: not-allowed; }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: .55rem .65rem;
      font-weight: 800;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .app {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin: 4px 0 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3.3rem);
      line-height: 1;
    }

    .lead {
      max-width: 780px;
      margin: 8px 0 0;
      color: #3e5053;
      line-height: 1.5;
      font-size: 1rem;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: .42rem .65rem;
      font-size: .8rem;
      font-weight: 900;
      white-space: nowrap;
      background: white;
      border: 1px solid var(--line);
      color: #34494d;
    }

    .pill.good { color: var(--good); background: #e3f5ec; border-color: #bce5ce; }
    .pill.warn { color: var(--warn); background: #fff2cc; border-color: #f4d98a; }
    .pill.bad { color: var(--bad); background: #ffe2e3; border-color: #f0b6ba; }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) minmax(140px, .7fr) minmax(140px, .7fr) auto;
      gap: 10px;
      align-items: end;
      background: rgba(255, 255, 255, .96);
      border: 1px solid rgba(204, 220, 221, .95);
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(31, 53, 58, .07);
      padding: 14px;
      margin-bottom: 16px;
    }

    .map-panel, .selected-panel {
      background: rgba(255, 255, 255, .96);
      border: 1px solid rgba(204, 220, 221, .95);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .map-panel { padding: 10px; }

    #map {
      width: 100%;
      height: min(66vh, 620px);
      min-height: 390px;
      border-radius: 8px;
      background: #dfe9e6;
    }

    .selected-panel {
      margin-top: 16px;
      padding: 18px;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .selected-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.45rem, 2.8vw, 2.5rem);
      line-height: 1.05;
    }

    .subline {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .fact {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfa;
    }

    .fact.good { color: var(--good); background: #e3f5ec; border-color: #bce5ce; }
    .fact.warn { color: var(--warn); background: #fff2cc; border-color: #f4d98a; }
    .fact.bad { color: var(--bad); background: #ffe2e3; border-color: #f0b6ba; }

    .fact b {
      display: block;
      margin-bottom: 4px;
      font-size: .76rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    .fact.good b, .fact.warn b, .fact.bad b { color: currentColor; }

    .fact span {
      font-size: 1.05rem;
      font-weight: 900;
    }

    .fact small {
      display: block;
      margin-top: 5px;
      color: currentColor;
      font-size: .82rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 16px;
      margin-top: 16px;
    }

    .copy {
      color: #33474a;
      line-height: 1.55;
      margin: 0;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: .38rem .58rem;
      font-size: .82rem;
      font-weight: 900;
      background: white;
      border: 1px solid var(--line);
      color: #34494d;
    }

    .chip.sea { color: var(--sea); background: var(--sea-soft); border-color: #b8dfe2; }
    .chip.lake { color: var(--lake); background: var(--lake-soft); border-color: #bbe0cb; }
    .chip.good { color: var(--good); background: #e3f5ec; border-color: #bce5ce; }
    .chip.warn { color: var(--warn); background: #fff2cc; border-color: #f4d98a; }
    .chip.bad { color: var(--bad); background: #ffe2e3; border-color: #f0b6ba; }

    .image-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f8fbfa;
    }

    .image-box figure {
      margin: 0;
    }

    .image-box img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #dfe9e6;
    }

    .image-box figcaption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.45;
    }

    .image-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .image-actions button {
      min-height: 36px;
      padding: .45rem .7rem;
    }

    .image-empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    .source {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.5;
    }

    .source a, .image-box a {
      color: var(--sea);
      font-weight: 900;
    }

    .leaflet-popup-content {
      font: 900 .92rem Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 10px 12px;
    }

    @media (max-width: 820px) {
      .app { padding: 14px; }
      header {
        grid-template-columns: 1fr;
      }
      .status { justify-content: flex-start; }
      .controls {
        grid-template-columns: 1fr;
      }
      .selected-head, .detail-grid {
        grid-template-columns: 1fr;
      }
      #map {
        height: 58vh;
        min-height: 340px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Badkarta Skåne</h1>
        <p class="lead">Alla badplatser i kartdatan, utan väderprognos. Klicka på en markör för badplatsinfo, service och verifierade bilder när sådana finns.</p>
      </div>
      <nav class="status" aria-label="Sidval och status">
        <a class="nav-button secondary" href="index.html">Ranking</a>
        <span id="statusPill" class="pill warn">Laddar karta</span>
        <span id="countPill" class="pill">0 badplatser</span>
      </nav>
    </header>

    <section class="controls" aria-label="Filtrera badkartan">
      <label>
        Sök
        <input id="searchInput" type="search" placeholder="Badplats eller kommun" autocomplete="off">
      </label>
      <label>
        Kategori
        <select id="typeFilter">
          <option value="all">Alla</option>
          <option value="Hav">Havsbad</option>
          <option value="inland">Sjö/vattendrag</option>
        </select>
      </label>
      <label>
        Vattenkvalitet
        <select id="qualityFilter">
          <option value="all">Alla</option>
          <option value="ok">Tjänligt</option>
          <option value="warning">Varning/avrådan</option>
          <option value="unknown">Uppgift saknas</option>
        </select>
      </label>
      <button id="resetButton" class="secondary" type="button">Rensa</button>
    </section>

    <main>
      <section class="map-panel" aria-label="Karta över badplatser">
        <div id="map"></div>
      </section>

      <section id="selectedPanel" class="selected-panel" aria-live="polite">
        <div class="empty">Klicka på en badplats i kartan.</div>
      </section>

      <p id="sourceLine" class="source"></p>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const DATA_URL = "map-data.json";
    const SKANE_CENTER = [55.93, 13.34];

    const state = {
      beaches: [],
      filtered: [],
      byId: new Map(),
      markers: new Map(),
      layer: null,
      map: null,
      selectedId: "",
      imageIndex: 0,
      generatedAt: "",
      sourceDataGeneratedAt: "",
      imageSourceNote: ""
    };

    const $ = (id) => document.getElementById(id);
    const toArray = (value) => Array.isArray(value) ? value : [];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function normalizeText(value) {
      return String(value || "")
        .toLocaleLowerCase("sv-SE")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function formatDate(value) {
      if (!value) return "Uppgift saknas";
      const date = new Date(`${value}T12:00:00`);
      return Number.isFinite(date.getTime())
        ? date.toLocaleDateString("sv-SE", { year: "numeric", month: "short", day: "numeric" })
        : String(value);
    }

    function formatDateTime(value) {
      if (!value) return "";
      const date = new Date(value);
      return Number.isFinite(date.getTime())
        ? date.toLocaleString("sv-SE", { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })
        : "";
    }

    function normalizeLink(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      return `https://${raw.replace(/^\/+/, "")}`;
    }

    function qualityKind(beach) {
      const quality = normalizeText(beach.quality);
      const algae = normalizeText(beach.algae);
      if (quality.includes("avrad") || quality.includes("otjan") || algae.includes("blomning") && !algae.includes("ingen")) return "bad";
      if (!quality || quality.includes("saknas")) return "warn";
      return "good";
    }

    function qualityFilterMatch(beach, filter) {
      const kind = qualityKind(beach);
      if (filter === "all") return true;
      if (filter === "ok") return kind === "good";
      if (filter === "warning") return kind === "bad";
      if (filter === "unknown") return kind === "warn";
      return true;
    }

    function isInland(beach) {
      return beach.type === "Sjö" || beach.type === "Vattendrag";
    }

    function typeLabel(beach) {
      if (beach.type === "Hav") return "Havsbad";
      if (beach.type === "Sjö") return "Sjöbad";
      if (beach.type === "Vattendrag") return "Vattendrag";
      return "Badplats";
    }

    function markerStyle(beach, selected = false) {
      const sea = beach.type === "Hav";
      const kind = qualityKind(beach);
      const color = kind === "bad" ? "#b23b42" : sea ? "#006b7d" : "#286148";
      return {
        radius: selected ? 10 : 6,
        color,
        fillColor: color,
        fillOpacity: selected ? .95 : .78,
        weight: selected ? 3 : 2
      };
    }

    function initMap() {
      if (!window.L) throw new Error("Kartbiblioteket kunde inte laddas.");
      state.map = L.map("map", {
        scrollWheelZoom: false,
        zoomControl: true
      }).setView(SKANE_CENTER, 8);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(state.map);
      state.layer = L.layerGroup().addTo(state.map);
    }

    function fitFiltered() {
      const points = state.filtered.map((beach) => [beach.lat, beach.lon]);
      if (!points.length) return;
      state.map.fitBounds(L.latLngBounds(points), { padding: [24, 24], maxZoom: 11 });
    }

    function renderMarkers() {
      state.layer.clearLayers();
      state.markers.clear();
      state.filtered.forEach((beach) => {
        const selected = beach.id === state.selectedId;
        const marker = L.circleMarker([beach.lat, beach.lon], markerStyle(beach, selected))
          .bindTooltip(`${beach.name}, ${beach.municipality}`)
          .bindPopup(`<b>${escapeHtml(beach.name)}</b><br>${escapeHtml(beach.municipality)} · ${escapeHtml(beach.type || "Bad")}`);
        marker.on("click", () => selectBeach(beach.id, { pan: false, scroll: true }));
        marker.addTo(state.layer);
        state.markers.set(beach.id, marker);
      });
    }

    function updateMarkerStyles() {
      state.markers.forEach((marker, id) => {
        const beach = state.byId.get(id);
        if (beach) marker.setStyle(markerStyle(beach, id === state.selectedId));
      });
    }

    function imageHtml(beach) {
      const images = toArray(beach.images);
      if (!images.length) {
        return `<div class="image-empty">Inga verifierade bilder hittades för den här badplatsen.</div>`;
      }
      const index = ((state.imageIndex % images.length) + images.length) % images.length;
      const image = images[index];
      const sourceLink = normalizeLink(image.originalUrl);
      const author = image.author ? ` · ${escapeHtml(image.author)}` : "";
      const license = image.license ? ` · ${escapeHtml(image.license)}` : "";
      const distance = Number.isFinite(image.distanceMeters) ? ` · ${image.distanceMeters} m från badplatsens koordinat` : "";
      return `
        <figure>
          <img src="${escapeHtml(normalizeLink(image.url))}" alt="${escapeHtml(beach.name)}">
          <figcaption>
            ${escapeHtml(image.title || beach.name)}${author}${license}${distance}
            ${sourceLink ? ` · <a href="${escapeHtml(sourceLink)}" target="_blank" rel="noopener">Wikimedia Commons</a>` : ""}
          </figcaption>
        </figure>
        ${images.length > 1 ? `
          <div class="image-actions">
            <button id="prevImage" class="secondary" type="button">Föregående</button>
            <span class="pill">${index + 1} / ${images.length}</span>
            <button id="nextImage" class="secondary" type="button">Nästa</button>
          </div>
        ` : ""}
      `;
    }

    function bacteriaStatus(beach) {
      const quality = normalizeText(beach.quality);
      if (quality.includes("avrad") || quality.includes("otjan")) {
        return {
          kind: "bad",
          text: "Otjänligt eller avrådan",
          detail: "Välj en annan badplats."
        };
      }
      if (quality.includes("anm")) {
        return {
          kind: "warn",
          text: "Vattenkvalitet med anmärkning",
          detail: "Förhöjda värden i senaste provet."
        };
      }
      if (quality.includes("tjanligt")) {
        return {
          kind: "good",
          text: "Bra vattenkvalitet",
          detail: "Bakterievärdena är normala i senaste provet."
        };
      }
      return {
        kind: "warn",
        text: "Vattenkvalitet okänd",
        detail: "Aktuell bakteriebedömning saknas."
      };
    }

    function renderSelected(beach) {
      if (!beach) {
        $("selectedPanel").innerHTML = `<div class="empty">Ingen badplats matchar filtren.</div>`;
        return;
      }
      const quality = qualityKind(beach);
      const bacteria = bacteriaStatus(beach);
      const typeClass = isInland(beach) ? "lake" : "sea";
      const services = toArray(beach.services);
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${beach.lat},${beach.lon}`)}`;
      $("selectedPanel").innerHTML = `
        <div class="selected-head">
          <div>
            <h2>${escapeHtml(beach.name)}</h2>
            <p class="subline">${escapeHtml(beach.municipality)} · ${escapeHtml(beach.type || "Badplats")}</p>
          </div>
          <a class="nav-button secondary" href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener">Öppna i karta</a>
        </div>

        <div class="facts">
          <div class="fact"><b>Vattenkvalitet</b><span>${escapeHtml(beach.quality || "Uppgift saknas")}</span></div>
          <div class="fact"><b>Senaste prov</b><span>${escapeHtml(formatDate(beach.latestSampleDate))}</span></div>
          <div class="fact"><b>Alger</b><span>${escapeHtml(beach.algae || "Uppgift saknas")}</span></div>
          <div class="fact ${bacteria.kind}"><b>Bakterier</b><span>${escapeHtml(bacteria.text)}</span><small>${escapeHtml(bacteria.detail)}</small></div>
        </div>

        <div class="chip-row">
          <span class="chip ${typeClass}">${escapeHtml(typeLabel(beach))}</span>
          <span class="chip ${quality}">${escapeHtml(beach.quality || "Uppgift saknas")}</span>
          ${services.length ? services.map((service) => `<span class="chip">${escapeHtml(service)}</span>`).join("") : `<span class="chip warn">Service ej bekräftad i källdata</span>`}
        </div>

        <div class="detail-grid">
          <div>
            <p class="copy">${escapeHtml(beach.description || "Ingen beskrivning i källdatan.")}</p>
          </div>
          <div class="image-box">${imageHtml(beach)}</div>
        </div>
      `;
      $("prevImage")?.addEventListener("click", () => {
        state.imageIndex -= 1;
        renderSelected(beach);
      });
      $("nextImage")?.addEventListener("click", () => {
        state.imageIndex += 1;
        renderSelected(beach);
      });
    }

    function selectBeach(id, options = {}) {
      const beach = state.byId.get(id);
      if (!beach) return;
      state.selectedId = id;
      state.imageIndex = 0;
      renderSelected(beach);
      updateMarkerStyles();
      if (options.pan !== false) state.map.setView([beach.lat, beach.lon], Math.max(state.map.getZoom(), 11), { animate: true });
      if (options.scroll) $("selectedPanel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function applyFilters({ fit = true } = {}) {
      const query = normalizeText($("searchInput").value);
      const type = $("typeFilter").value;
      const quality = $("qualityFilter").value;
      state.filtered = state.beaches.filter((beach) => {
        const haystack = normalizeText(`${beach.name} ${beach.municipality}`);
        return (!query || haystack.includes(query))
          && (type === "all" || beach.type === type || (type === "inland" && isInland(beach)))
          && qualityFilterMatch(beach, quality);
      });
      if (!state.filtered.some((beach) => beach.id === state.selectedId)) {
        state.selectedId = state.filtered[0]?.id || "";
        state.imageIndex = 0;
      }
      renderMarkers();
      renderSelected(state.byId.get(state.selectedId));
      $("countPill").textContent = `${state.beaches.length} badplatser`;
      if (fit && state.filtered.length) fitFiltered();
    }

    async function loadData() {
      const response = await fetch(DATA_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      const data = await response.json();
      state.beaches = toArray(data.beaches)
        .filter((beach) => Number.isFinite(Number(beach.lat)) && Number.isFinite(Number(beach.lon)))
        .sort((a, b) => String(a.name).localeCompare(String(b.name), "sv-SE"));
      state.byId = new Map(state.beaches.map((beach) => [beach.id, beach]));
      state.generatedAt = data.generatedAt || "";
      state.sourceDataGeneratedAt = data.sourceDataGeneratedAt || "";
      state.imageSourceNote = data.imageSourceNote || "";
      $("statusPill").className = "pill good";
      $("statusPill").textContent = "Kartdata laddad";
      $("sourceLine").innerHTML = `
        Källa: <a href="https://www.havochvatten.se/data-kartor-och-rapporter/data-och-statistik/data-och-apier/api-badplatser-och-badvatten.html" target="_blank" rel="noopener">HaV badplatsdata</a>.
        Bilder: <a href="https://commons.wikimedia.org/wiki/Commons:API/MediaWiki" target="_blank" rel="noopener">Wikimedia Commons</a>, bara när koordinaten matchar badplatsen.
        ${state.generatedAt ? `Kartdata skapad ${escapeHtml(formatDateTime(state.generatedAt))}.` : ""}
        ${state.sourceDataGeneratedAt ? `Badplatsdata från ${escapeHtml(formatDateTime(state.sourceDataGeneratedAt))}.` : ""}
      `;
    }

    async function main() {
      initMap();
      await loadData();
      applyFilters();
      $("searchInput").addEventListener("input", () => applyFilters());
      $("typeFilter").addEventListener("change", () => applyFilters());
      $("qualityFilter").addEventListener("change", () => applyFilters());
      $("resetButton").addEventListener("click", () => {
        $("searchInput").value = "";
        $("typeFilter").value = "all";
        $("qualityFilter").value = "all";
        applyFilters();
      });
      window.badkarta = { state, selectBeach, applyFilters };
    }

    main().catch((error) => {
      console.error(error);
      $("statusPill").className = "pill bad";
      $("statusPill").textContent = "Kunde inte ladda";
      $("selectedPanel").innerHTML = `<div class="empty">Kartan kunde inte laddas: ${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
